# ======================================================
# RuralEduHub - Application Configuration
# ======================================================

# Database Configuration (MySQL)
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/ruraleduhub?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true&createDatabaseIfNotExist=true}
spring.datasource.driverClassName=com.mysql.cj.jdbc.Driver
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:root}
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

# Connection Pool (HikariCP)
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000

# Hibernate settings - DISABLED DDL AUTO FOR PRODUCTION
# Using Flyway for database migrations in production
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.defer-datasource-initialization=false
spring.sql.init.mode=never

# Flyway settings - ENABLED FOR PRODUCTION
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.locations=classpath:db/migration
spring.flyway.validate-on-migrate=true

# Caching - Use Caffeine (no external dependency)
spring.cache.type=caffeine
spring.cache.caffeine.spec=maximumSize=500,expireAfterWrite=600s

# Server
server.port=8081
spring.mvc.view.prefix=/WEB-INF/jsp/
spring.mvc.view.suffix=.jsp

# Actuator settings - secured for production
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=when_authorized
management.endpoint.info.enabled=true
management.server.port=${MANAGEMENT_PORT:8081}
management.endpoints.web.base-path=/actuator
# Add IP whitelist for actuator in production (uncomment and configure)
# management.server.address=127.0.0.1

# Swagger / OpenAPI
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html

# Security - Default admin (only used by Spring Security auto-config, not our custom UserDetailsService)

# Async and Scheduling
spring.task.execution.pool.core-size=5
spring.task.execution.pool.max-size=10
spring.task.scheduling.pool.size=2

# Mail Configuration
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# Logging - Production-grade structured logging with correlation IDs
logging.level.root=INFO
logging.level.com.ruraledu=DEBUG
logging.level.org.springframework.security=INFO
logging.level.org.hibernate.SQL=WARN
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level [%X{correlationId:-N/A}] %logger{36} - %msg%n
logging.pattern.file=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level [%X{correlationId:-N/A}] %logger{36} - %msg%n
logging.file.name=${LOG_PATH:./logs}/ruraleduhub.log
logging.file.max-size=10MB
logging.file.max-history=30

# File upload settings
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# YouTube Integration - Now uses web scraping (no API key required)

# Open-in-view is disabled to prevent warning and to ensure proper transaction boundaries
spring.jpa.open-in-view=false

# Certificate Storage (CERT-01 fix)
# Override in production/Docker with an absolute path on a mounted volume, e.g.:
# certificate.storage.path=/data/certificates
certificate.storage.path=${user.dir}/certificates
